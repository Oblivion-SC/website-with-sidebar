<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soundcloud</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Боковая панель -->
    <div class="sidebar">
        <div class="logo">
            Soundcloud
            <i class="fa-brands fa-soundcloud"></i>
        </div>
        <!-- Поле ввода -->
        <div class="search-wrapper">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input class="search-input" type="text" placeholder="Search">
        </div>
        
        <div class="menu">
            <a class="chapter" href="#">Discover</a>
            <a class="chapter" href="#">Tending</a>
            <a class="chapter" href="#">Album</a>
            <a class="chapter" href="#">Playlist</a>
            <a class="chapter" href="#">Favorites</a>
            <a class="chapter" href="#">Profile</a>
            <a class="chapter" href="#">Settings</a>
            <div class="active-indicator"></div>
        </div>
    </div>
</body>
</html>
